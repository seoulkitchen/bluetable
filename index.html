<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양이삼거리의 부엌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm: #e8dcc8;
    --brown: #6b4f3a;
    --dark: #2c1f14;
    --accent: #c17f4a;
    --muted: #9c8472;
    --green: #7a9e7e;
    --spring: #a8c5a0;
    --summer: #e8a87c;
    --autumn: #c4874a;
    --winter: #8aabcc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--dark);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* Header */
  header {
    background-color: var(--dark);
    color: var(--cream);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(255,255,255,0.015) 20px,
      rgba(255,255,255,0.015) 40px
    );
  }

  .header-cat {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    opacity: 0.8;
  }

  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }

  header p {
    font-size: 0.85rem;
    opacity: 0.55;
    letter-spacing: 0.1em;
  }

  /* Search bar */
  .search-wrap {
    background: var(--warm);
    padding: 1.5rem 2rem;
    border-bottom: 1px solid rgba(107,79,58,0.15);
  }

  .search-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }

  .search-inner input {
    flex: 1;
    padding: 0.7rem 1.2rem;
    border: 1px solid rgba(107,79,58,0.3);
    border-radius: 2px;
    background: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    color: var(--dark);
    outline: none;
  }

  .search-inner input:focus {
    border-color: var(--accent);
  }

  .search-inner input::placeholder { color: var(--muted); }

  .btn-search {
    padding: 0.7rem 1.5rem;
    background: var(--brown);
    color: var(--cream);
    border: none;
    border-radius: 2px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-search:hover { background: var(--accent); }

  /* Season filter */
  .season-bar {
    max-width: 720px;
    margin: 1rem auto 0;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .season-btn {
    padding: 0.35rem 1rem;
    border: 1px solid rgba(107,79,58,0.25);
    border-radius: 20px;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.2s;
  }

  .season-btn:hover, .season-btn.active {
    background: var(--brown);
    color: var(--cream);
    border-color: var(--brown);
  }

  .season-btn[data-season="봄"].active { background: var(--spring); border-color: var(--spring); color: var(--dark); }
  .season-btn[data-season="여름"].active { background: var(--summer); border-color: var(--summer); color: var(--dark); }
  .season-btn[data-season="가을"].active { background: var(--autumn); border-color: var(--autumn); color: var(--cream); }
  .season-btn[data-season="겨울"].active { background: var(--winter); border-color: var(--winter); color: var(--dark); }

  /* Timeline slider */
  .timeline-wrap {
    background: var(--warm);
    border-bottom: 1px solid rgba(107,79,58,0.15);
    padding: 1rem 2rem 1.2rem;
  }

  .timeline-inner {
    max-width: 720px;
    margin: 0 auto;
  }

  .timeline-label {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
    letter-spacing: 0.05em;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .year-display {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--brown);
    min-width: 110px;
    text-align: center;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: rgba(107,79,58,0.3);
    outline: none;
    border-radius: 2px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  /* Stats bar */
  .stats-bar {
    max-width: 720px;
    margin: 0 auto;
    padding: 1rem 2rem 0.5rem;
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Cards */
  .cards-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 0.5rem 2rem 4rem;
  }

  .card {
    background: white;
    border: 1px solid rgba(107,79,58,0.12);
    border-radius: 2px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(107,79,58,0.1);
  }

  .card-meta {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    margin-bottom: 0.6rem;
  }

  .season-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .season-dot.봄 { background: var(--spring); }
  .season-dot.여름 { background: var(--summer); }
  .season-dot.가을 { background: var(--autumn); }
  .season-dot.겨울 { background: var(--winter); }
  .season-dot.미분류 { background: var(--muted); }

  .card-date {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .card-season-tag {
    font-size: 0.7rem;
    padding: 0.15rem 0.6rem;
    border-radius: 10px;
    background: var(--warm);
    color: var(--brown);
  }

  .card h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 0.5rem;
    line-height: 1.5;
  }

  .card p {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-keywords {
    margin-top: 0.75rem;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .keyword-tag {
    font-size: 0.7rem;
    padding: 0.15rem 0.55rem;
    border: 1px solid rgba(107,79,58,0.2);
    border-radius: 10px;
    color: var(--brown);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(44,31,20,0.7);
    z-index: 100;
    padding: 2rem 1rem;
    overflow-y: auto;
  }

  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

  .modal {
    background: var(--cream);
    max-width: 680px;
    width: 100%;
    border-radius: 2px;
    overflow: hidden;
    margin: auto;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    background: var(--dark);
    color: var(--cream);
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }

  .modal-header h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.2rem;
    font-weight: 600;
    line-height: 1.5;
  }

  .modal-header .meta {
    font-size: 0.78rem;
    opacity: 0.55;
    margin-top: 0.3rem;
  }

  .btn-close {
    background: none;
    border: none;
    color: var(--cream);
    font-size: 1.4rem;
    cursor: pointer;
    opacity: 0.6;
    flex-shrink: 0;
    line-height: 1;
  }

  .btn-close:hover { opacity: 1; }

  .modal-lang {
    background: var(--warm);
    padding: 0.75rem 2rem;
    display: flex;
    gap: 0.5rem;
    border-bottom: 1px solid rgba(107,79,58,0.15);
  }

  .lang-btn {
    padding: 0.3rem 1rem;
    border: 1px solid rgba(107,79,58,0.3);
    border-radius: 2px;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.2s;
  }

  .lang-btn.active {
    background: var(--brown);
    color: var(--cream);
    border-color: var(--brown);
  }

  .modal-body {
    padding: 2rem;
    font-size: 0.95rem;
    line-height: 1.9;
    color: var(--dark);
    white-space: pre-wrap;
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
    min-height: 200px;
  }

  .modal-keywords {
    padding: 1rem 2rem 1.5rem;
    border-top: 1px solid rgba(107,79,58,0.1);
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* Translation notice */
  .translate-notice {
    background: var(--warm);
    border: 1px dashed rgba(107,79,58,0.3);
    padding: 1rem 1.5rem;
    margin: 1rem 2rem;
    font-size: 0.82rem;
    color: var(--muted);
    border-radius: 2px;
    line-height: 1.6;
  }

</style>
</head>
<body>

<header>
  <div class="header-cat">🐱</div>
  <h1>고양이삼거리의 부엌</h1>
  <p>bluetable · 일상의 기록</p>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <input type="text" id="searchInput" placeholder="검색어를 입력하세요..." />
    <button class="btn-search" onclick="doSearch()">검색</button>
  </div>
  <div class="season-bar">
    <button class="season-btn active" data-season="전체" onclick="filterSeason('전체', this)">전체</button>
    <button class="season-btn" data-season="봄" onclick="filterSeason('봄', this)">🌸 봄</button>
    <button class="season-btn" data-season="여름" onclick="filterSeason('여름', this)">🌿 여름</button>
    <button class="season-btn" data-season="가을" onclick="filterSeason('가을', this)">🍂 가을</button>
    <button class="season-btn" data-season="겨울" onclick="filterSeason('겨울', this)">❄️ 겨울</button>
  </div>
</div>

<div class="timeline-wrap">
  <div class="timeline-inner">
    <div class="timeline-label">인생의 시기로 찾기</div>
    <div class="slider-row">
      <span style="font-size:0.78rem;color:var(--muted)">2020</span>
      <input type="range" id="yearStart" min="2020" max="2026" value="2020" oninput="updateTimeline()">
      <span class="year-display" id="yearDisplay">2020 — 2026</span>
      <input type="range" id="yearEnd" min="2020" max="2026" value="2026" oninput="updateTimeline()">
      <span style="font-size:0.78rem;color:var(--muted)">2026</span>
    </div>
  </div>
</div>

<div class="stats-bar">
  <span id="statsText">글을 불러오는 중...</span>
</div>

<div class="cards-wrap" id="cardsWrap">
  <div class="loading">글을 불러오는 중...</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modalTitle"></h2>
        <div class="meta" id="modalMeta"></div>
      </div>
      <button class="btn-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-lang">
      <button class="lang-btn active" id="btnKo" onclick="switchLang('ko')">한국어</button>
      <button class="lang-btn" id="btnEn" onclick="switchLang('en')">English</button>
    </div>
    <div id="translateNotice" class="translate-notice" style="display:none">
      영문 번역은 준비 중이에요. 추후 업데이트될 예정입니다.
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-keywords" id="modalKeywords"></div>
  </div>
</div>

<script>
let allData = [];
let filtered = [];
let currentSeason = '전체';
let currentSearch = '';
let currentYearStart = 2020;
let currentYearEnd = 2026;
let currentArticle = null;
let currentLang = 'ko';

// Load JSON
fetch('brunch_data.json')
  .then(r => r.json())
  .then(data => {
    allData = data;
    applyFilters();
  })
  .catch(() => {
    document.getElementById('cardsWrap').innerHTML =
      '<div class="empty">brunch_data.json 파일을 찾을 수 없어요.<br>같은 폴더에 있는지 확인해주세요.</div>';
  });

function getYear(dateStr) {
  const m = dateStr.match(/20\d{2}/);
  return m ? parseInt(m[0]) : 2020;
}

function applyFilters() {
  filtered = allData.filter(d => {
    const year = getYear(d.date);
    const matchSeason = currentSeason === '전체' || d.season === currentSeason;
    const matchYear = year >= currentYearStart && year <= currentYearEnd;
    const matchSearch = !currentSearch ||
      d.title.includes(currentSearch) ||
      d.content.includes(currentSearch) ||
      (d.keywords && d.keywords.some(k => k.includes(currentSearch)));
    return matchSeason && matchYear && matchSearch;
  });

  renderCards();
  updateStats();
}

function renderCards() {
  const wrap = document.getElementById('cardsWrap');
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty">해당하는 글이 없어요 🐱</div>';
    return;
  }

  wrap.innerHTML = filtered.map((d, i) => `
    <div class="card" onclick="openModal(${allData.indexOf(d)})">
      <div class="card-meta">
        <div class="season-dot ${d.season}"></div>
        <span class="card-date">${d.date}</span>
        <span class="card-season-tag">${d.season}</span>
      </div>
      <h2>${d.title}</h2>
      <p>${d.summary || ''}</p>
      ${d.keywords && d.keywords.length > 0 ? `
        <div class="card-keywords">
          ${d.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('')}
        </div>
      ` : ''}
    </div>
  `).join('');
}

function updateStats() {
  const total = allData.length;
  const shown = filtered.length;
  document.getElementById('statsText').textContent =
    `전체 ${total}개 중 ${shown}개 표시`;
}

function filterSeason(season, btn) {
  currentSeason = season;
  document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value.trim();
  applyFilters();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function updateTimeline() {
  let s = parseInt(document.getElementById('yearStart').value);
  let e = parseInt(document.getElementById('yearEnd').value);
  if (s > e) { let t = s; s = e; e = t; }
  currentYearStart = s;
  currentYearEnd = e;
  document.getElementById('yearDisplay').textContent = s === e ? s : `${s} — ${e}`;
  applyFilters();
}

function openModal(idx) {
  currentArticle = allData[idx];
  currentLang = 'ko';
  document.getElementById('modalTitle').textContent = currentArticle.title;
  document.getElementById('modalMeta').textContent =
    `${currentArticle.date}  ·  ${currentArticle.season}`;
  document.getElementById('modalBody').textContent = currentArticle.content;
  document.getElementById('btnKo').classList.add('active');
  document.getElementById('btnEn').classList.remove('active');
  document.getElementById('translateNotice').style.display = 'none';

  const kw = currentArticle.keywords || [];
  document.getElementById('modalKeywords').innerHTML =
    kw.map(k => `<span class="keyword-tag">${k}</span>`).join('');

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function switchLang(lang) {
  currentLang = lang;
  document.getElementById('btnKo').classList.toggle('active', lang === 'ko');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');

  if (lang === 'ko') {
    document.getElementById('translateNotice').style.display = 'none';
    document.getElementById('modalBody').textContent = currentArticle.content;
  } else {
    document.getElementById('translateNotice').style.display = 'block';
    document.getElementById('modalBody').textContent = currentArticle.content;
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
