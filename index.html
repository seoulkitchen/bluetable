<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양이삼거리의 부엌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm: #e8dcc8;
    --brown: #6b4f3a;
    --dark: #2c1f14;
    --accent: #c17f4a;
    --muted: #9c8472;
    --spring: #a8c5a0;
    --summer: #e8a87c;
    --autumn: #c4874a;
    --winter: #8aabcc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--dark);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  header {
    background-color: var(--dark);
    color: var(--cream);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 20px,
      rgba(255,255,255,0.015) 20px, rgba(255,255,255,0.015) 40px
    );
  }

  .header-cat { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.8; }

  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }

  header p { font-size: 0.85rem; opacity: 0.55; letter-spacing: 0.1em; }

  .filter-wrap {
    background: var(--warm);
    padding: 1.2rem 2rem;
    border-bottom: 1px solid rgba(107,79,58,0.15);
  }

  .filter-inner { max-width: 720px; margin: 0 auto; }

  .search-row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    margin-bottom: 1rem;
  }

  .search-row input {
    flex: 1;
    padding: 0.7rem 1.2rem;
    border: 1px solid rgba(107,79,58,0.3);
    border-radius: 2px;
    background: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    color: var(--dark);
    outline: none;
  }

  .search-row input:focus { border-color: var(--accent); }
  .search-row input::placeholder { color: var(--muted); }

  .btn-search {
    padding: 0.7rem 1.5rem;
    background: var(--brown);
    color: var(--cream);
    border: none;
    border-radius: 2px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-search:hover { background: var(--accent); }

  .filter-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.45rem;
    letter-spacing: 0.05em;
  }

  .btn-row {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
  }

  .filter-btn {
    padding: 0.3rem 0.9rem;
    border: 1px solid rgba(107,79,58,0.25);
    border-radius: 20px;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { background: rgba(107,79,58,0.1); }

  .filter-btn.active {
    background: var(--brown);
    color: var(--cream);
    border-color: var(--brown);
  }

  .filter-btn[data-season="봄"].active { background: var(--spring); border-color: var(--spring); color: var(--dark); }
  .filter-btn[data-season="여름"].active { background: var(--summer); border-color: var(--summer); color: var(--dark); }
  .filter-btn[data-season="가을"].active { background: var(--autumn); border-color: var(--autumn); color: var(--cream); }
  .filter-btn[data-season="겨울"].active { background: var(--winter); border-color: var(--winter); color: var(--dark); }

  .timeline-wrap {
    background: var(--warm);
    border-bottom: 1px solid rgba(107,79,58,0.15);
    padding: 0.8rem 2rem 1rem;
  }

  .timeline-inner { max-width: 720px; margin: 0 auto; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .year-display {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    color: var(--brown);
    min-width: 100px;
    text-align: center;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: rgba(107,79,58,0.3);
    outline: none;
    border-radius: 2px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  .stats-bar {
    max-width: 720px;
    margin: 0 auto;
    padding: 0.8rem 2rem 0.4rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .cards-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 0.5rem 2rem 4rem;
  }

  .card {
    background: white;
    border: 1px solid rgba(107,79,58,0.12);
    border-radius: 2px;
    padding: 1.4rem;
    margin-bottom: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(107,79,58,0.1);
  }

  .card-meta {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    margin-bottom: 0.55rem;
    flex-wrap: wrap;
  }

  .season-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .season-dot.봄 { background: var(--spring); }
  .season-dot.여름 { background: var(--summer); }
  .season-dot.가을 { background: var(--autumn); }
  .season-dot.겨울 { background: var(--winter); }
  .season-dot.미분류 { background: var(--muted); }

  .card-date { font-size: 0.73rem; color: var(--muted); }

  .tag {
    font-size: 0.68rem;
    padding: 0.12rem 0.55rem;
    border-radius: 10px;
    background: var(--warm);
    color: var(--brown);
  }

  .tag.category { background: rgba(107,79,58,0.08); }

  .card h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 0.45rem;
    line-height: 1.5;
  }

  .card p {
    font-size: 0.83rem;
    color: var(--muted);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-keywords {
    margin-top: 0.65rem;
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
  }

  .keyword-tag {
    font-size: 0.68rem;
    padding: 0.12rem 0.5rem;
    border: 1px solid rgba(107,79,58,0.2);
    border-radius: 10px;
    color: var(--brown);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(44,31,20,0.7);
    z-index: 100;
    padding: 2rem 1rem;
    overflow-y: auto;
  }

  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

  .modal {
    background: var(--cream);
    max-width: 680px;
    width: 100%;
    border-radius: 2px;
    overflow: hidden;
    margin: auto;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    background: var(--dark);
    color: var(--cream);
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }

  .modal-header h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.5;
  }

  .modal-header .meta { font-size: 0.76rem; opacity: 0.55; margin-top: 0.3rem; }

  .btn-close {
    background: none;
    border: none;
    color: var(--cream);
    font-size: 1.4rem;
    cursor: pointer;
    opacity: 0.6;
    flex-shrink: 0;
    line-height: 1;
  }

  .btn-close:hover { opacity: 1; }

  .modal-lang {
    background: var(--warm);
    padding: 0.7rem 2rem;
    display: flex;
    gap: 0.5rem;
    border-bottom: 1px solid rgba(107,79,58,0.15);
  }

  .lang-btn {
    padding: 0.28rem 0.9rem;
    border: 1px solid rgba(107,79,58,0.3);
    border-radius: 2px;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.2s;
  }

  .lang-btn.active { background: var(--brown); color: var(--cream); border-color: var(--brown); }

  .translate-notice {
    background: var(--warm);
    border: 1px dashed rgba(107,79,58,0.3);
    padding: 0.8rem 1.5rem;
    margin: 1rem 2rem 0;
    font-size: 0.8rem;
    color: var(--muted);
    border-radius: 2px;
    line-height: 1.6;
  }

  .modal-body {
    padding: 2rem;
    font-size: 0.93rem;
    line-height: 1.95;
    color: var(--dark);
    white-space: pre-wrap;
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
    min-height: 200px;
  }

  .modal-keywords {
    padding: 1rem 2rem 1.5rem;
    border-top: 1px solid rgba(107,79,58,0.1);
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .empty, .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 2;
  }
</style>
</head>
<body>

<header>
  <div class="header-cat">🐱</div>
  <h1>고양이삼거리의 부엌</h1>
  <p>bluetable · 일상의 기록</p>
</header>

<div class="filter-wrap">
  <div class="filter-inner">

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="검색어를 입력하세요..." />
      <button class="btn-search" onclick="doSearch()">검색</button>
    </div>

    <div class="filter-label">계절</div>
    <div class="btn-row" id="seasonRow">
      <button class="filter-btn active" data-season="전체" onclick="filterSeason('전체', this)">전체</button>
      <button class="filter-btn" data-season="봄" onclick="filterSeason('봄', this)">🌸 봄</button>
      <button class="filter-btn" data-season="여름" onclick="filterSeason('여름', this)">🌿 여름</button>
      <button class="filter-btn" data-season="가을" onclick="filterSeason('가을', this)">🍂 가을</button>
      <button class="filter-btn" data-season="겨울" onclick="filterSeason('겨울', this)">❄️ 겨울</button>
    </div>

    <div class="filter-label">카테고리</div>
    <div class="btn-row" id="categoryRow">
      <button class="filter-btn active" data-cat="전체" onclick="filterCategory('전체', this)">전체</button>
      <button class="filter-btn" data-cat="🍳 요리/레시피" onclick="filterCategory('🍳 요리/레시피', this)">🍳 요리/레시피</button>
      <button class="filter-btn" data-cat="🏠 집/공간" onclick="filterCategory('🏠 집/공간', this)">🏠 집/공간</button>
      <button class="filter-btn" data-cat="🌿 동네/생활" onclick="filterCategory('🌿 동네/생활', this)">🌿 동네/생활</button>
      <button class="filter-btn" data-cat="✈️ 여행" onclick="filterCategory('✈️ 여행', this)">✈️ 여행</button>
      <button class="filter-btn" data-cat="👨‍👩‍👧 가족/사람" onclick="filterCategory('👨‍👩‍👧 가족/사람', this)">👨‍👩‍👧 가족/사람</button>
      <button class="filter-btn" data-cat="💭 생각/에세이" onclick="filterCategory('💭 생각/에세이', this)">💭 생각/에세이</button>
    </div>

  </div>
</div>

<div class="timeline-wrap">
  <div class="timeline-inner">
    <div class="filter-label">인생의 시기로 찾기</div>
    <div class="slider-row">
      <span style="font-size:0.75rem;color:var(--muted)">2020</span>
      <input type="range" id="yearStart" min="2020" max="2026" value="2020" oninput="updateTimeline()">
      <span class="year-display" id="yearDisplay">2020 — 2026</span>
      <input type="range" id="yearEnd" min="2020" max="2026" value="2026" oninput="updateTimeline()">
      <span style="font-size:0.75rem;color:var(--muted)">2026</span>
    </div>
  </div>
</div>

<div class="stats-bar">
  <span id="statsText">글을 불러오는 중...</span>
</div>

<div class="cards-wrap" id="cardsWrap">
  <div class="loading">글을 불러오는 중...</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modalTitle"></h2>
        <div class="meta" id="modalMeta"></div>
      </div>
      <button class="btn-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-lang">
      <button class="lang-btn active" id="btnKo" onclick="switchLang('ko')">한국어</button>
      <button class="lang-btn" id="btnEn" onclick="switchLang('en')">English</button>
    </div>
    <div id="translateNotice" class="translate-notice" style="display:none">
      영문 번역은 준비 중이에요. 추후 업데이트될 예정입니다.
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-keywords" id="modalKeywords"></div>
  </div>
</div>

<script>
let allData = [];
let currentSeason = '전체';
let currentCategory = '전체';
let currentSearch = '';
let currentYearStart = 2020;
let currentYearEnd = 2026;
let currentArticle = null;

fetch('brunch_data.json')
  .then(r => r.json())
  .then(data => {
    allData = data;
    applyFilters();
  })
  .catch(() => {
    document.getElementById('cardsWrap').innerHTML =
      '<div class="empty">brunch_data.json 파일을 찾을 수 없어요.<br>같은 폴더에 있는지 확인해주세요.</div>';
  });

function getYear(dateStr) {
  const m = (dateStr || '').match(/20\d{2}/);
  return m ? parseInt(m[0]) : 2020;
}

function applyFilters() {
  const filtered = allData.filter(d => {
    const year = getYear(d.date);
    const matchSeason = currentSeason === '전체' || d.season === currentSeason;
    const matchCat = currentCategory === '전체' || d.category === currentCategory;
    const matchYear = year >= currentYearStart && year <= currentYearEnd;
    const matchSearch = !currentSearch ||
      (d.title || '').includes(currentSearch) ||
      (d.content || '').includes(currentSearch) ||
      (d.keywords || []).some(k => k.includes(currentSearch));
    return matchSeason && matchCat && matchYear && matchSearch;
  });

  renderCards(filtered);
  document.getElementById('statsText').textContent =
    `전체 ${allData.length}개 중 ${filtered.length}개 표시`;
}

function renderCards(data) {
  const wrap = document.getElementById('cardsWrap');
  if (data.length === 0) {
    wrap.innerHTML = '<div class="empty">해당하는 글이 없어요 🐱</div>';
    return;
  }
  wrap.innerHTML = data.map(d => {
    const idx = allData.indexOf(d);
    return `
    <div class="card" onclick="openModal(${idx})">
      <div class="card-meta">
        <div class="season-dot ${d.season || '미분류'}"></div>
        <span class="card-date">${d.date || ''}</span>
        <span class="tag">${d.season || '미분류'}</span>
        ${d.category ? `<span class="tag category">${d.category}</span>` : ''}
      </div>
      <h2>${d.title || ''}</h2>
      <p>${d.summary || ''}</p>
      ${d.keywords && d.keywords.length > 0 ? `
        <div class="card-keywords">
          ${d.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('')}
        </div>` : ''}
    </div>`;
  }).join('');
}

function filterSeason(season, btn) {
  currentSeason = season;
  document.querySelectorAll('#seasonRow .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('#categoryRow .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value.trim();
  applyFilters();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function updateTimeline() {
  let s = parseInt(document.getElementById('yearStart').value);
  let e = parseInt(document.getElementById('yearEnd').value);
  if (s > e) { let t = s; s = e; e = t; }
  currentYearStart = s;
  currentYearEnd = e;
  document.getElementById('yearDisplay').textContent = s === e ? String(s) : `${s} — ${e}`;
  applyFilters();
}

function openModal(idx) {
  currentArticle = allData[idx];
  document.getElementById('modalTitle').textContent = currentArticle.title || '';
  document.getElementById('modalMeta').textContent =
    `${currentArticle.date || ''}  ·  ${currentArticle.season || ''}  ·  ${currentArticle.category || ''}`;
  document.getElementById('modalBody').textContent = currentArticle.content || '';
  document.getElementById('btnKo').classList.add('active');
  document.getElementById('btnEn').classList.remove('active');
  document.getElementById('translateNotice').style.display = 'none';
  document.getElementById('modalKeywords').innerHTML =
    (currentArticle.keywords || []).map(k => `<span class="keyword-tag">${k}</span>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function switchLang(lang) {
  document.getElementById('btnKo').classList.toggle('active', lang === 'ko');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('translateNotice').style.display = lang === 'en' ? 'block' : 'none';
  document.getElementById('modalBody').textContent = currentArticle ? currentArticle.content || '' : '';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
